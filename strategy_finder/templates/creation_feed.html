<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Feed — Strategy Finder</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        .feed-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            height: calc(100vh - 140px);
            overflow: hidden;
        }

        .feed-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .feed-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .filter-bar button {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .filter-bar button.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .feed-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .feed-item {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
            cursor: default;
        }
        
        .feed-item.clickable {
            cursor: pointer;
        }
        
        .feed-item.clickable:hover {
            background: rgba(255,255,255,0.02);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-badge {
            color: var(--text-muted);
            min-width: 70px;
        }

        .phase-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 90px;
            text-align: center;
        }

        .phase-created { background: rgba(148, 163, 184, 0.1); color: #94a3b8; }
        .phase-rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .phase-backtest_failed { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .phase-robustness_failed { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .phase-scored_out { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .phase-saved { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .phase-hall_of_fame { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid #a855f7; font-weight: 800; }

        .item-content { flex: 1; color: var(--text-secondary); }
        .item-content .id-badge { color: var(--accent-blue); }
        .item-content .origin { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin-left: 6px; }

        .stats-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-row:last-child { border-bottom: none; }
        
        .stat-val { font-family: 'Fira Code', monospace; font-weight: bold; color: var(--text-primary); }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-top: 1rem;
            display: flex;
            overflow: hidden;
        }
        
        .prog-saved { background: #22c55e; transition: width 0.3s; }
        .prog-rejected { background: #ef4444; transition: width 0.3s; }
        .prog-btfail { background: #f59e0b; transition: width 0.3s; }
        .prog-robfail { background: #eab308; transition: width 0.3s; }

        .pulse-dot {
            height: 8px; width: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .pulse-dot.active {
            background-color: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        input.search-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            width: 150px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="nav-brand">
            <span class="logo">StrategyFinder</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Leaderboard</a></li>
            <li><a href="/live">Live Status</a></li>
            <li>
                <a href="/feed" class="active">
                    <span id="nav-pulse" class="pulse-dot"></span>Live Feed
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 2rem;">
    <div class="feed-layout">
        
        <!-- Left Panel: Feed -->
        <div class="feed-panel">
            <div class="feed-header">
                <div class="filter-bar" id="filter-bar">
                    <button class="active" data-filter="all">All</button>
                    <button data-filter="created">Created</button>
                    <button data-filter="rejected">Rejected</button>
                    <button data-filter="saved">Saved</button>
                    <button data-filter="hall_of_fame">Hall of Fame</button>
                </div>
                <input type="text" id="search-input" class="search-input" placeholder="Search ID, name...">
            </div>
            <ul class="feed-scroll" id="feed-container">
                <!-- Items injected here -->
            </ul>
        </div>

        <!-- Right Panel: Stats -->
        <div class="stats-card">
            <h3 style="margin-top:0; border-bottom: 1px solid var(--glass-border); padding-bottom:1rem;">Generation Stats</h3>
            
            <div class="stat-row">
                <span>Generation</span>
                <span class="stat-val" id="stat-gen">-</span>
            </div>
            <div class="stat-row">
                <span>Created</span>
                <span class="stat-val" id="stat-created">0</span>
            </div>
            <div class="stat-row">
                <span>Passed Fast Reject</span>
                <span class="stat-val"><span id="stat-passed-fr">0</span> <span style="font-size:0.7rem; color:var(--text-muted);" id="stat-fr-pct">(0%)</span></span>
            </div>
            <div class="stat-row">
                <span>Passed Full BT</span>
                <span class="stat-val"><span id="stat-passed-bt">0</span> <span style="font-size:0.7rem; color:var(--text-muted);" id="stat-bt-pct">(0%)</span></span>
            </div>
            <div class="stat-row">
                <span>Passed Robustness</span>
                <span class="stat-val"><span id="stat-passed-rob">0</span> <span style="font-size:0.7rem; color:var(--text-muted);" id="stat-rob-pct">(0%)</span></span>
            </div>
            <div class="stat-row" style="color: #22c55e;">
                <span>Saved to DB</span>
                <span class="stat-val" id="stat-saved">0</span>
            </div>
            
            <div style="margin-top:2rem;">
                <span style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase;">Phase Distribution</span>
                <div class="progress-bar-container">
                    <div class="prog-saved" id="bar-saved" style="width:0%" title="Saved"></div>
                    <div class="prog-robfail" id="bar-robfail" style="width:0%" title="Robustness Failed"></div>
                    <div class="prog-btfail" id="bar-btfail" style="width:0%" title="Backtest Failed"></div>
                    <div class="prog-rejected" id="bar-rejected" style="width:0%" title="Fast Rejected"></div>
                </div>
            </div>
            
            <h3 style="margin-top:2rem; border-bottom: 1px solid var(--glass-border); padding-bottom:1rem;">Global Status</h3>
            <div class="stat-row">
                <span>All-Time Best</span>
                <span class="stat-val" id="stat-best">-</span>
            </div>
            <div class="stat-row">
                <span>DB Count</span>
                <span class="stat-val" id="stat-db">0</span>
            </div>
            <div class="stat-row">
                <span>Throughput (60s)</span>
                <span class="stat-val"><span id="stat-tpm">0</span> / min</span>
            </div>
        </div>

    </div>
</div>

<script>
    const socket = io();
    const feedContainer = document.getElementById('feed-container');
    const filterButtons = document.querySelectorAll('.filter-bar button');
    const searchInput = document.getElementById('search-input');
    const navPulse = document.getElementById('nav-pulse');
    
    let currentFilter = 'all';
    let currentSearch = '';
    
    let stats = {
        gen: 0,
        created: 0,
        rejected: 0,
        btfail: 0,
        robfail: 0,
        scoredOut: 0,
        saved: 0,
        tpmTracker: [],
        bestScore: 0
    };
    
    let lastEventTime = Date.now();
    
    // Heartbeat for pulse dot and TPM
    setInterval(() => {
        if (Date.now() - lastEventTime > 5000) {
            navPulse.classList.remove('active');
        } else {
            navPulse.classList.add('active');
        }
        
        // Calculate TPM
        const now = Date.now();
        stats.tpmTracker = stats.tpmTracker.filter(t => now - t < 60000);
        document.getElementById('stat-tpm').innerText = stats.tpmTracker.length;
        
    }, 1000);

    // Filters
    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilters();
        });
    });
    
    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
    });

    function applyFilters() {
        const items = feedContainer.children;
        for (let item of items) {
            const phase = item.dataset.phase;
            const text = item.innerText.toLowerCase();
            
            let show = true;
            if (currentFilter !== 'all' && phase !== currentFilter) {
                show = false;
            }
            if (currentSearch && !text.includes(currentSearch)) {
                show = false;
            }
            
            item.style.display = show ? 'flex' : 'none';
        }
    }

    function formatTime(iso) {
        const d = new Date(iso);
        return d.toLocaleTimeString('en-US', { hour12: false });
    }

    function formatLabel(phase) {
        if (phase === 'created') return 'GEN';
        if (phase === 'rejected') return 'FAST REJECT';
        if (phase === 'backtest_failed') return 'BT FAIL';
        if (phase === 'robustness_failed') return 'ROBUST FAIL';
        if (phase === 'scored_out') return 'SCORED OUT';
        if (phase === 'saved') return 'SAVED';
        if (phase === 'hall_of_fame') return 'HALL OF FAME';
        return phase.toUpperCase();
    }
    
    function resetGenStats(gen) {
        stats.gen = gen;
        stats.created = 0;
        stats.rejected = 0;
        stats.btfail = 0;
        stats.robfail = 0;
        stats.scoredOut = 0;
        stats.saved = 0;
        document.getElementById('stat-gen').innerText = gen;
        updateUIStats();
    }
    
    function updateUIStats() {
        document.getElementById('stat-created').innerText = stats.created;
        
        const passedFR = stats.created - stats.rejected;
        document.getElementById('stat-passed-fr').innerText = Math.max(0, passedFR);
        document.getElementById('stat-fr-pct').innerText = `(${stats.created ? Math.round(passedFR/stats.created*100) : 0}%)`;
        
        const passedBT = passedFR - stats.btfail;
        document.getElementById('stat-passed-bt').innerText = Math.max(0, passedBT);
        document.getElementById('stat-bt-pct').innerText = `(${stats.created ? Math.round(passedBT/stats.created*100) : 0}%)`;
        
        const passedRob = passedBT - stats.robfail;
        document.getElementById('stat-passed-rob').innerText = Math.max(0, passedRob);
        document.getElementById('stat-rob-pct').innerText = `(${stats.created ? Math.round(passedRob/stats.created*100) : 0}%)`;
        
        document.getElementById('stat-saved').innerText = stats.saved;
        
        // Progress bar
        const total = stats.rejected + stats.btfail + stats.robfail + stats.scoredOut + stats.saved;
        if (total > 0) {
            document.getElementById('bar-saved').style.width = `${(stats.saved/total)*100}%`;
            document.getElementById('bar-robfail').style.width = `${((stats.robfail + stats.scoredOut)/total)*100}%`;
            document.getElementById('bar-btfail').style.width = `${(stats.btfail/total)*100}%`;
            document.getElementById('bar-rejected').style.width = `${(stats.rejected/total)*100}%`;
        }
    }

    socket.on("strategy_event", (data) => {
        lastEventTime = Date.now();
        navPulse.classList.add('active');
        
        if (data.phase === 'created') {
            stats.tpmTracker.push(Date.now());
            if (data.generation > stats.gen) {
                resetGenStats(data.generation);
            }
            stats.created++;
        } else if (data.phase === 'rejected') {
            stats.rejected++;
        } else if (data.phase === 'backtest_failed') {
            stats.btfail++;
        } else if (data.phase === 'robustness_failed') {
            stats.robfail++;
        } else if (data.phase === 'scored_out') {
            stats.scoredOut++;
        } else if (data.phase === 'saved') {
            stats.saved++;
            if (data.is_new_best) {
                stats.bestScore = data.score;
                document.getElementById('stat-best').innerText = `${data.score.toFixed(2)} (${data.name})`;
            }
        }
        
        updateUIStats();

        const li = document.createElement('li');
        li.className = `feed-item`;
        if (data.phase === 'saved' || data.phase === 'hall_of_fame') {
            li.classList.add('clickable');
            li.onclick = () => window.open(`/strategy/${data.id}`, '_blank');
        }
        
        li.dataset.phase = data.phase;
        
        let details = "";
        if (data.phase === 'created') {
            details = `<span class="id-badge">${data.id}</span> ${data.asset || ''} | SL×${data.sl_mult} RR×${data.rr_ratio} Cmplx:${data.complexity} <span class="origin">[${data.origin}]</span>`;
        } else if (data.phase === 'rejected' || data.phase === 'robustness_failed' || data.phase === 'scored_out') {
            details = `<span class="id-badge">${data.id}</span> - ${data.reason}: ${typeof data.value === 'number' ? data.value.toFixed(2) : data.value}`;
        } else if (data.phase === 'saved') {
            details = `<span class="id-badge">${data.id}</span> <strong>${data.name}</strong> | Score:${data.score.toFixed(2)} CAGR:${data.cagr.toFixed(1)}% WR:${data.win_rate.toFixed(1)}% DD:${data.max_drawdown.toFixed(1)}%`;
        } else if (data.phase === 'hall_of_fame') {
            details = `<span class="id-badge">${data.id}</span> <strong>${data.name}</strong> entered the Hall of Fame! (Score: ${data.score.toFixed(2)})`;
        } else {
            details = `<span class="id-badge">${data.id}</span>`;
        }
        
        li.innerHTML = `
            <div class="time-badge">[${formatTime(data.timestamp)}]</div>
            <div class="phase-badge phase-${data.phase}">${formatLabel(data.phase)}</div>
            <div class="item-content">${details}</div>
        `;
        
        // Apply filters immediately
        let show = true;
        if (currentFilter !== 'all' && data.phase !== currentFilter) show = false;
        if (currentSearch && !li.innerText.toLowerCase().includes(currentSearch)) show = false;
        li.style.display = show ? 'flex' : 'none';
        
        feedContainer.prepend(li);
        
        // Keep only 200 elements to prevent DOM bloat
        if (feedContainer.children.length > 200) {
            feedContainer.removeChild(feedContainer.lastChild);
        }
    });

    // Update global generation on page load via api event if possible
    socket.on("generation_update", (data) => {
        if (data.generation > stats.gen) {
            resetGenStats(data.generation);
        }
        document.getElementById('stat-db').innerText = data.db_count;
        if (data.best_score > stats.bestScore) {
            stats.bestScore = data.best_score;
            document.getElementById('stat-best').innerText = data.best_score.toFixed(2);
        }
    });
</script>
</body>
</html>
